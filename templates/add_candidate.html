{% extends 'layout.html' %}

{% block content %}

<h3>Add Candidate</h3>

<form method="POST"
enctype="multipart/form-data">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Manifesto</label>

<textarea
name="manifesto"
class="form-control"
rows="5"
required></textarea>

</div>

<div class="mb-3">

<label>Position</label>

<select
name="position"
class="form-control">

{% for p in positions %}

<option value="{{ p.id }}">
{{ p.name }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Candidate Image</label>

<input
type="file"
name="image"
class="form-control">

</div>

<button class="btn btn-dark">
Add Candidate
</button>

</form>

{% endblock %}
