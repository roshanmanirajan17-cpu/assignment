<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block page_title %}SRC Election Portal{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="{{ body_class|default('') }}">
<nav class="navbar navbar-expand-lg navbar-transparent">
    <div class="container align-items-center">
        <a class="navbar-brand d-flex align-items-center gap-2 text-white fw-bold">
            <img src="{{ url_for('uploaded_file', filename='mila_logo.png') }}" alt="MILA Logo" class="nav-logo">
            <span>SRC Election Portal</span>
        </a>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-light logout-btn">Logout</a>
        {% endif %}
    </div>
</nav>
<div class="main-container">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-success" style="background: rgba(2, 6, 23, 0.95); color: #ffffff; border: 1px solid rgba(96, 165, 250, 0.3);">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</body>
</html>
